layout: compress

<!DOCTYPE html>
<html lang="en">
{% include head.html %}

<body>
  <main role="main">
    {% include anchor_headings.html html=content anchorBody="#" %}
  </main>

  <script type="text/javascript">
    (function () {
      var root = document.documentElement;
      var toggle = document.querySelector("[data-theme-toggle]");
      var mediaQuery = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
      var prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      function syncToggle(theme) {
        if (!toggle) {
          return;
        }

        var nextTheme = theme === "dark" ? "light" : "dark";

        toggle.setAttribute("aria-label", "Switch to " + nextTheme + " mode");
        toggle.setAttribute("aria-pressed", String(theme === "dark"));
      }

      function setTheme(theme, persist) {
        root.setAttribute("data-theme", theme);
        syncToggle(theme);

        if (!persist) {
          return;
        }

        try {
          window.localStorage.setItem("theme", theme);
        } catch (error) {
        }
      }

      function getStoredTheme() {
        try {
          return window.localStorage.getItem("theme");
        } catch (error) {
          return null;
        }
      }

      function animateCollapsible(section, content, expand) {
        section.dataset.animating = "true";

        if (expand) {
          section.dataset.closing = "";
          section.open = true;
          content.style.height = "0px";
        } else {
          section.dataset.closing = "true";
          content.style.height = content.scrollHeight + "px";
        }

        requestAnimationFrame(function () {
          content.style.height = expand ? content.scrollHeight + "px" : "0px";
        });
      }

      function setupCollapsibleSection(section) {
        var summary = section.querySelector(".collapsible-section__summary");
        var content = section.querySelector(".collapsible-section__content");

        if (!summary || !content) {
          return;
        }

        content.addEventListener("transitionend", function (event) {
          if (event.target !== content || event.propertyName !== "height") {
            return;
          }

          if (section.dataset.closing === "true") {
            section.open = false;
            section.dataset.closing = "";
            content.style.height = "";
          } else if (section.open) {
            content.style.height = "auto";
          }

          section.dataset.animating = "";
        });

        summary.addEventListener("click", function (event) {
          if (section.dataset.animating === "true") {
            event.preventDefault();
            return;
          }

          event.preventDefault();

          animateCollapsible(section, content, !section.open);
        });
      }

      function setupCollapsibleSections() {
        if (prefersReducedMotion) {
          return;
        }

        var collapsibles = document.querySelectorAll(".collapsible-section");

        if (!collapsibles.length) {
          return;
        }

        collapsibles.forEach(setupCollapsibleSection);
      }

      var storedTheme = getStoredTheme();
      var initialTheme = storedTheme || root.getAttribute("data-theme") || (mediaQuery && mediaQuery.matches ? "dark" : "light");

      setTheme(initialTheme, false);

      if (toggle) {
        toggle.addEventListener("click", function () {
          var currentTheme = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
          setTheme(currentTheme === "dark" ? "light" : "dark", true);
        });
      }

      if (mediaQuery && typeof mediaQuery.addEventListener === "function" && !storedTheme) {
        mediaQuery.addEventListener("change", function (event) {
          setTheme(event.matches ? "dark" : "light", false);
        });
      }

      setupCollapsibleSections();
    })();
  </script>
</body>

</html>
